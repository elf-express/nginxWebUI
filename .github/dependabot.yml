# Dependabot 自動 PR 提醒第三方依賴升級
# 文件：https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file
version: 2
updates:
  # Docker base images in docker/docker-compose.yml
  - package-ecosystem: "docker"
    directory: "/docker"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "docker"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    # 自家 release image 由發版流程控管,且為 private → Dependabot 無 creds 去查會 error;排除之
    ignore:
      - dependency-name: "ghcr.io/elf-express/nginxwebui"

  # GitHub Actions versions in .github/workflows/*.yml
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "ci"
    commit-message:
      prefix: "chore(ci)"
      include: "scope"

  # Maven dependencies in pom.xml
  - package-ecosystem: "maven"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "java"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    # 排除 Solon parent（升 framework 主版號要單獨 PR review）
    ignore:
      - dependency-name: "org.noear:solon-parent"
        update-types: ["version-update:semver-major"]
