# Dependabot 自動 PR 提醒第三方依賴升級
# 文件：https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file
version: 2
updates:
  # Root Dockerfile 的 base image(alpine)。
  # Dependabot 的 docker ecosystem 需要 Dockerfile(不掃 docker-compose.yml),
  # 真正的 Dockerfile 在 repo root,故 directory 指 "/"(先前指 /docker 找不到 Dockerfile 而報錯)。
  # compose 的 sidecar 官方 image(postgres/grafana/crowdsec…)不在此 ecosystem 覆蓋範圍。
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "docker"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"

  # crowdsec 自建 image 的 base(crowdsecurity/crowdsec)
  - package-ecosystem: "docker"
    directory: "/docker/crowdsec"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "docker"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"

  # GitHub Actions versions in .github/workflows/*.yml
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "ci"
    commit-message:
      prefix: "chore(ci)"
      include: "scope"

  # Maven dependencies in pom.xml
  - package-ecosystem: "maven"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "java"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    # 排除 Solon parent（升 framework 主版號要單獨 PR review）
    ignore:
      - dependency-name: "org.noear:solon-parent"
        update-types: ["version-update:semver-major"]
