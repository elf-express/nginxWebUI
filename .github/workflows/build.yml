name: Build & Test & Release

# Trigger 模型：
#   push to dev      → 跑 build/test、不 push image
#   push to master   → 跑 build/test、不 push image (master 是已 release 快照)
#   push tag v*      → 跑 build/test + buildx + push image (:x.y.z + :latest)
#   pull_request to master → 跑 build/test
on:
  push:
    branches: [master, dev]
    tags: ['v*']
  pull_request:
    branches: [master]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build JAR
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn clean package -DskipTests -q

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: nginxWebUI-jar
          path: target/nginxWebUI-*.jar
          retention-days: 7

  docker:
    name: Build & Push Docker image
    needs: build
    runs-on: ubuntu-latest
    # 只在 push tag v* 時才 build + push image
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'
          cache: maven

      - name: Build JAR
        run: mvn clean package -DskipTests -q

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag and verify pom.xml
        id: version
        run: |
          # 從 tag (refs/tags/v5.0.4) 抓出 5.0.4
          VER="${GITHUB_REF#refs/tags/v}"
          echo "VERSION=$VER" >> "$GITHUB_OUTPUT"

          # 驗證 pom.xml 的 nginxWebUI 版本與 tag 一致（不能搬到 parent solon-parent 版本）
          POM_VER=$(grep -A1 'artifactId>nginxWebUI' pom.xml | grep version | grep -oP '\d+\.\d+\.\d+')
          if [ "$POM_VER" != "$VER" ]; then
            echo "::error::Tag ($VER) 和 pom.xml ($POM_VER) 不一致 — release script 沒跑或漏改 pom"
            exit 1
          fi
          echo "✓ tag $VER 與 pom.xml $POM_VER 一致"

      - name: Build and Push (multi-platform)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/elf-express/nginxwebui:${{ steps.version.outputs.VERSION }}
            ghcr.io/elf-express/nginxwebui:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
