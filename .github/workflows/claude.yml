name: Claude Code

# Claude Code GitHub Action — 回應 Issue / PR 中的 @claude 提及。
# 認證:Claude Max 20x 訂閱的「一年期」OAuth token(由 `claude setup-token` 產生),
#       存為 repo secret CLAUDE_CODE_OAUTH_TOKEN。不需付費 API key。
# 教學:docs/claude-code-action-setup.md
# 官方文件:https://code.claude.com/docs/en/github-actions

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]
  issues:
    types: [opened, assigned]

jobs:
  claude:
    # 只有留言含 "@claude" 才啟動 job —— 避免在無關留言上白燒 Agent SDK 額度與 Actions 分鐘。
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && contains(github.event.issue.body, '@claude'))
    runs-on: ubuntu-latest
    permissions:
      contents: write # 讀寫檔案、推送分支
      pull-requests: write # 建立/更新 PR、留言
      issues: write # 回應 Issue
      id-token: write # OIDC — claude-code-action 用來交換 GitHub token(缺這行會 "Could not fetch an OIDC token")
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Run Claude Code
        uses: anthropics/claude-code-action@558b1d6cab4085c7753fe402c10bef0fbb92ac7a # v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}  
          claude_args: "--max-turns 10 --model claude-sonnet-4-6"