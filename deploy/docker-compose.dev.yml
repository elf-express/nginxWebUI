# 開發環境覆蓋檔 — 從原始碼編譯 nginxwebui image 進行本地驗證
# 用法：
#   cd deploy
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d --build
#
# 預設 docker-compose.yml 從 ghcr.io 拉已 release 的 image。此 override
# 把 nginxwebui service 改成「從專案根的 Dockerfile 本地 build」，方便
# release 前在本機跑端對端驗證。
services:
  nginxwebui:
    image: nginxwebui:dev
    build:
      context: ..
      dockerfile: Dockerfile
