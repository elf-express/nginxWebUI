services:
  nginxwebui:
    # 預設拉 ghcr.io 上的 release image。要釘版本：在 deploy/.env 設 NGINX_WEBUI_VERSION=5.0.14
    # 想從原始碼本機 build：在 deploy/ 跑 `docker compose up -d --build`（會跑 ../Dockerfile）
    image: ghcr.io/elf-express/nginxwebui:${NGINX_WEBUI_VERSION:-latest}
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: nginxwebui
    restart: unless-stopped
    ports:
      - "12300:8080"
      - "80:80"
      - "443:443"
    volumes:
      - nginxwebui_data:/home/nginxWebUI
      - nginxwebui_log:/home/nginxWebUI/log
      - nginxwebui_geoip:/etc/nginx/geoip  # MMDB ~80 MB，restart 不重抓；crontab 每週三六自動更新
    environment:
      - JVM_XMX=256m
      - BOOT_OPTIONS=--spring.database.type=postgresql --spring.datasource.url=jdbc:postgresql://postgres:5432/nginxwebui --spring.datasource.username=nginxwebui --spring.datasource.password=nginxwebui123 --init.admin=${INIT_ADMIN:-admin} --init.pass=${INIT_PASS:-Admin123}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080"]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3

  postgres:
    # postgres 18-alpine：18+ image PGDATA 慣例改為 mount /var/lib/postgresql（不是 /data 子目錄），
    # 由 image entrypoint 自動建 <version>/data/ 子目錄。
    image: postgres:18-alpine
    container_name: nginxwebui-postgres
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql
    environment:
      - POSTGRES_DB=nginxwebui
      - POSTGRES_USER=nginxwebui
      - POSTGRES_PASSWORD=nginxwebui123
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nginxwebui"]
      interval: 10s
      timeout: 5s
      start_period: 10s
      retries: 5

  # ── 日誌監控 ──────────────────────────────────

  promtail:
    image: grafana/promtail:3.5.0
    container_name: nginxwebui-promtail
    restart: unless-stopped
    volumes:
      - nginxwebui_log:/var/log/nginx:ro
      - ./promtail-config.yml:/etc/promtail/config.yml:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki

  loki:
    image: grafana/loki:3.5.0
    container_name: nginxwebui-loki
    restart: unless-stopped
    volumes:
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3100/ready || exit 1"]
      interval: 15s
      timeout: 5s
      start_period: 20s
      retries: 3

  grafana:
    image: grafana/grafana:11.6.0
    container_name: nginxwebui-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana-datasources.yml:/etc/grafana/provisioning/datasources/loki.yml:ro
      - ./grafana-dashboards.yml:/etc/grafana/provisioning/dashboards/default.yml:ro
      - ./grafana-nginx-dashboard.json:/var/lib/grafana/dashboards/nginx-monitor.json:ro
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    depends_on:
      loki:
        condition: service_healthy

  # ── 安全防護 ──────────────────────────────────

  crowdsec:
    image: crowdsecurity/crowdsec:v1.7.8
    container_name: nginxwebui-crowdsec
    restart: unless-stopped
    volumes:
      - nginxwebui_log:/var/log/nginx:ro
      - crowdsec_data:/var/lib/crowdsec/data
      - crowdsec_config:/etc/crowdsec
      - ./crowdsec/acquis.yml:/etc/crowdsec/acquis.yaml:ro
      - ./crowdsec/abuseipdb.yaml:/etc/crowdsec/notifications/abuseipdb.yaml:ro
      - ./crowdsec/profiles.yaml:/etc/crowdsec/profiles.yaml:ro
    environment:
      - COLLECTIONS=crowdsecurity/nginx crowdsecurity/http-cve crowdsecurity/base-http-scenarios
      - BOUNCER_KEY_nginx=${CROWDSEC_BOUNCER_KEY}
      - ABUSEIPDB_API_KEY=${ABUSEIPDB_API_KEY}
    healthcheck:
      test: ["CMD", "cscli", "version"]
      interval: 15s
      timeout: 5s
      start_period: 30s
      retries: 3

  crowdsec-bouncer:
    image: fbonalair/traefik-crowdsec-bouncer:0.5.0
    container_name: nginxwebui-bouncer
    restart: unless-stopped
    environment:
      - CROWDSEC_BOUNCER_API_KEY=${CROWDSEC_BOUNCER_KEY}
      - CROWDSEC_AGENT_HOST=crowdsec:8080
      - PORT=8181
    depends_on:
      crowdsec:
        condition: service_healthy

volumes:
  nginxwebui_data:
    name: nginxwebui_data
  nginxwebui_log:
    name: nginxwebui_log
  postgres_data:
    name: nginxwebui_postgres_data
  loki_data:
    name: nginxwebui_loki_data
  grafana_data:
    name: nginxwebui_grafana_data
  crowdsec_data:
    name: nginxwebui_crowdsec_data
  crowdsec_config:
    name: nginxwebui_crowdsec_config
  nginxwebui_geoip:
    name: nginxwebui_geoip
