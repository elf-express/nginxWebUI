# Harbor Docker Registry - 獨立部署
# 使用方式：複製到伺服器上，修改 .env 後 docker compose up -d

services:
  registry:
    image: goharbor/registry-photon:v2.12.2
    container_name: harbor-registry
    restart: unless-stopped
    volumes:
      - registry_data:/storage
    networks:
      - harbor

  registryctl:
    image: goharbor/harbor-registryctl:v2.12.2
    container_name: harbor-registryctl
    restart: unless-stopped
    volumes:
      - registry_data:/storage
    networks:
      - harbor

  db:
    image: goharbor/harbor-db:v2.12.2
    container_name: harbor-db
    restart: unless-stopped
    volumes:
      - harbor_db:/var/lib/postgresql/data
    environment:
      - POSTGRES_PASSWORD=${HARBOR_DB_PASSWORD:-harbor123}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      start_period: 20s
      retries: 5
    networks:
      - harbor

  core:
    image: goharbor/harbor-core:v2.12.2
    container_name: harbor-core
    restart: unless-stopped
    environment:
      - CORE_SECRET=${HARBOR_CORE_SECRET:-harbor-core-secret}
      - JOBSERVICE_SECRET=${HARBOR_JOB_SECRET:-harbor-job-secret}
      - REGISTRY_CREDENTIAL_PASSWORD=${HARBOR_REGISTRY_PASSWORD:-harbor123}
    depends_on:
      db:
        condition: service_healthy
      registry:
        condition: service_started
    networks:
      - harbor

  jobservice:
    image: goharbor/harbor-jobservice:v2.12.2
    container_name: harbor-jobservice
    restart: unless-stopped
    environment:
      - CORE_SECRET=${HARBOR_CORE_SECRET:-harbor-core-secret}
      - JOBSERVICE_SECRET=${HARBOR_JOB_SECRET:-harbor-job-secret}
    depends_on:
      - core
    networks:
      - harbor

  portal:
    image: goharbor/harbor-portal:v2.12.2
    container_name: harbor-portal
    restart: unless-stopped
    networks:
      - harbor

  proxy:
    image: goharbor/nginx-photon:v2.12.2
    container_name: harbor-proxy
    restart: unless-stopped
    ports:
      - "${HARBOR_PORT:-8443}:8443"
    depends_on:
      - core
      - portal
    networks:
      - harbor

  redis:
    image: goharbor/redis-photon:v2.12.2
    container_name: harbor-redis
    restart: unless-stopped
    volumes:
      - harbor_redis:/var/lib/redis
    networks:
      - harbor

volumes:
  registry_data:
    name: harbor_registry_data
  harbor_db:
    name: harbor_db_data
  harbor_redis:
    name: harbor_redis_data

networks:
  harbor:
    name: harbor_network
