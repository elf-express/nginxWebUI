.header-link-btn:focus-visible { outline:2px solid #fff; outline-offset:2px; }
.link-button {
    background: transparent;
    border: 0;
    cursor: pointer;
    padding: 0;
    font: inherit;
    color: #bbbbbb;
    text-decoration: underline;
}
.link-button:focus-visible { outline: 2px solid currentColor; outline-offset: 2px; }
</style>
