<?xml version="1.0" encoding="UTF-8"?>
<svg width="1920" height="1080" viewBox="0 0 1920 1080" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#0f2027"/>
            <stop offset="50%" stop-color="#203a43"/>
            <stop offset="100%" stop-color="#2c5364"/>
        </linearGradient>
        <linearGradient id="accent1" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#00b09b" stop-opacity="0.3"/>
            <stop offset="100%" stop-color="#96c93d" stop-opacity="0.1"/>
        </linearGradient>
        <linearGradient id="accent2" x1="100%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#4facfe" stop-opacity="0.2"/>
            <stop offset="100%" stop-color="#00f2fe" stop-opacity="0.05"/>
        </linearGradient>
        <radialGradient id="glow1" cx="20%" cy="30%" r="40%">
            <stop offset="0%" stop-color="#00b09b" stop-opacity="0.15"/>
            <stop offset="100%" stop-color="#00b09b" stop-opacity="0"/>
        </radialGradient>
        <radialGradient id="glow2" cx="80%" cy="70%" r="35%">
            <stop offset="0%" stop-color="#4facfe" stop-opacity="0.12"/>
            <stop offset="100%" stop-color="#4facfe" stop-opacity="0"/>
        </radialGradient>
    </defs>

    <!-- Base gradient -->
    <rect width="1920" height="1080" fill="url(#bg)"/>

    <!-- Subtle glows -->
    <rect width="1920" height="1080" fill="url(#glow1)"/>
    <rect width="1920" height="1080" fill="url(#glow2)"/>

    <!-- Geometric shapes -->
    <circle cx="300" cy="200" r="350" fill="url(#accent1)" opacity="0.4"/>
    <circle cx="1650" cy="850" r="400" fill="url(#accent2)" opacity="0.3"/>
    <circle cx="1000" cy="100" r="200" fill="url(#accent2)" opacity="0.2"/>

    <!-- Subtle grid lines -->
    <g stroke="rgba(255,255,255,0.03)" stroke-width="1">
        <line x1="0" y1="200" x2="1920" y2="200"/>
        <line x1="0" y1="400" x2="1920" y2="400"/>
        <line x1="0" y1="600" x2="1920" y2="600"/>
        <line x1="0" y1="800" x2="1920" y2="800"/>
        <line x1="400" y1="0" x2="400" y2="1080"/>
        <line x1="800" y1="0" x2="800" y2="1080"/>
        <line x1="1200" y1="0" x2="1200" y2="1080"/>
        <line x1="1600" y1="0" x2="1600" y2="1080"/>
    </g>

    <!-- Decorative curves -->
    <path d="M0,900 Q400,700 800,800 T1920,600" stroke="rgba(0,176,155,0.15)" stroke-width="2" fill="none"/>
    <path d="M0,950 Q500,750 1000,850 T1920,700" stroke="rgba(79,172,254,0.1)" stroke-width="1.5" fill="none"/>
    <path d="M0,300 Q600,150 1200,250 T1920,100" stroke="rgba(150,201,61,0.08)" stroke-width="1.5" fill="none"/>

    <!-- Floating dots -->
    <circle cx="150" cy="400" r="3" fill="rgba(0,176,155,0.4)"/>
    <circle cx="500" cy="150" r="2" fill="rgba(79,172,254,0.3)"/>
    <circle cx="900" cy="350" r="2.5" fill="rgba(150,201,61,0.3)"/>
    <circle cx="1400" cy="200" r="2" fill="rgba(0,242,254,0.3)"/>
    <circle cx="1700" cy="500" r="3" fill="rgba(0,176,155,0.25)"/>
    <circle cx="300" cy="700" r="2" fill="rgba(79,172,254,0.2)"/>
    <circle cx="1100" cy="800" r="2.5" fill="rgba(150,201,61,0.2)"/>
    <circle cx="1800" cy="300" r="1.5" fill="rgba(0,242,254,0.25)"/>
    <circle cx="700" cy="600" r="2" fill="rgba(0,176,155,0.2)"/>
    <circle cx="1300" cy="650" r="1.5" fill="rgba(79,172,254,0.2)"/>
</svg>
